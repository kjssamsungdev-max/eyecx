name = "eyecx-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Account settings (set via environment or wrangler secret)
# account_id = "your_account_id"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "eyecx"
database_id = "d33d4f46-5599-47f0-8b70-1b6ea0175496"

# Environment variables (set via wrangler secret)
# API_SECRET - Bearer token for API auth
# CLOUDFLARE_API_TOKEN - For registrar API
# CLOUDFLARE_ACCOUNT_ID - Account ID

[vars]
ENVIRONMENT = "production"

# Development settings
[env.dev]
name = "eyecx-api-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "eyecx-dev"
database_id = ""

# Routes
# routes = [
#   { pattern = "api.eyecx.com/*", zone_name = "eyecx.com" }
# ]
