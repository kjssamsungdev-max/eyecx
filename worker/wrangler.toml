name = "eyecx-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "eyecx"
database_id = "d33d4f46-5599-47f0-8b70-1b6ea0175496"

# R2 Storage binding
[[r2_buckets]]
binding = "ZONES"
bucket_name = "eyecx-zones"

# Secrets (set via wrangler secret put):
# API_SECRET            - Bearer token for API auth
# CLOUDFLARE_API_TOKEN  - For registrar API
# CLOUDFLARE_ACCOUNT_ID - Account ID
# CZDS_USERNAME         - ICANN CZDS email
# CZDS_PASSWORD         - ICANN CZDS password

# Note: CZDS auth is blocked from CF Worker IPs (503).
# Zone file downloads run via GitHub Actions instead.
# [triggers]
# crons = ["0 1 * * *"]

[vars]
ENVIRONMENT = "production"

# Development settings
[env.dev]
name = "eyecx-api-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "eyecx-dev"
database_id = ""
