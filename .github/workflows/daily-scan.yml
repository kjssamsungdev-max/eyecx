name: EyeCX Daily Scan

on:
  schedule:
    # Run at 3 AM UTC daily (after czds-daily.yml at 1 AM)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to process (YYYY-MM-DD, default: today)'
        required: false
        default: ''
      limit:
        description: 'Max domains to score per TLD'
        required: false
        default: '5000'

env:
  PYTHON_VERSION: '3.11'
  OPENPAGERANK_API_KEY: ${{ secrets.OPENPAGERANK_API_KEY }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  D1_DATABASE_ID: d33d4f46-5599-47f0-8b70-1b6ea0175496
  R2_ENDPOINT: https://dbaac4c99956159d7594d90033b0224d.r2.cloudflarestorage.com

jobs:
  # Step 1: Diff zone snapshots to find dropped domains
  diff-zones:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    outputs:
      has_dropped: ${{ steps.diff.outputs.has_dropped }}
      dropped_file: ${{ steps.diff.outputs.dropped_file }}
      total_dropped: ${{ steps.diff.outputs.total_dropped }}

    steps:
      - name: Diff zone snapshots
        id: diff
        env:
          EYECX_API_URL: https://eyecx-api.kjssamsungdev.workers.dev
          EYECX_API_SECRET: ${{ secrets.EYECX_API_SECRET }}
        run: |
          set -eo pipefail
          mkdir -p snapshots dropped

          INPUT_DATE="${{ github.event.inputs.date || '' }}"

          # Query Worker API to find the two most recent snapshots per TLD
          # Use xyz as the reference TLD — all three TLDs share the same CZDS schedule
          echo "Querying R2 for available snapshots..."
          DATES=$(curl -s -H "Authorization: Bearer $EYECX_API_SECRET" \
            "$EYECX_API_URL/api/zones/xyz" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          dates = sorted([s['date'] for s in data.get('snapshots', []) if s.get('size', 0) > 10000], reverse=True)
          for d in dates[:5]: print(d)
          ")
          echo "Available snapshot dates: $DATES"

          NEWER=""
          OLDER=""
          if [ -n "$INPUT_DATE" ]; then
            NEWER="$INPUT_DATE"
            OLDER=$(echo "$DATES" | grep -v "^${INPUT_DATE}$" | head -1)
          else
            NEWER=$(echo "$DATES" | head -1)
            OLDER=$(echo "$DATES" | sed -n '2p')
          fi

          if [ -z "$NEWER" ] || [ -z "$OLDER" ]; then
            echo "::error::Need two snapshots. Found: $(echo $DATES | tr '\n' ' ')"
            echo "has_dropped=false" >> $GITHUB_OUTPUT
            echo "total_dropped=0" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "Diffing: $OLDER (older) vs $NEWER (newer)"

          TOTAL=0
          DROPPED_FILE="dropped/all_dropped_${NEWER}.txt"
          > "$DROPPED_FILE"

          for TLD in xyz info org; do
            OKEY="snapshots/${TLD}/${TLD}_${OLDER}.domains.txt"
            NKEY="snapshots/${TLD}/${TLD}_${NEWER}.domains.txt"

            echo "Downloading $TLD snapshots..."
            aws s3 cp "s3://eyecx-zones/$OKEY" "snapshots/${TLD}_older.txt" \
              --endpoint-url "$R2_ENDPOINT" --no-progress 2>/dev/null || { echo "  No older snapshot for $TLD"; continue; }
            aws s3 cp "s3://eyecx-zones/$NKEY" "snapshots/${TLD}_newer.txt" \
              --endpoint-url "$R2_ENDPOINT" --no-progress 2>/dev/null || { echo "  No newer snapshot for $TLD"; continue; }

            echo "Diffing $TLD ($OLDER vs $NEWER)..."
            comm -23 "snapshots/${TLD}_older.txt" "snapshots/${TLD}_newer.txt" > "dropped/${TLD}_dropped.txt"

            COUNT=$(wc -l < "dropped/${TLD}_dropped.txt")
            echo "  $TLD: $COUNT dropped domains"
            cat "dropped/${TLD}_dropped.txt" >> "$DROPPED_FILE"
            TOTAL=$((TOTAL + COUNT))

            aws s3 cp "dropped/${TLD}_dropped.txt" \
              "s3://eyecx-zones/dropped/${TLD}/dropped_${TLD}_${NEWER}.txt" \
              --endpoint-url "$R2_ENDPOINT" --no-progress
          done

          echo "Total dropped: $TOTAL"
          echo "total_dropped=$TOTAL" >> $GITHUB_OUTPUT
          echo "dropped_file=$DROPPED_FILE" >> $GITHUB_OUTPUT

          if [ "$TOTAL" -gt 0 ]; then
            echo "has_dropped=true" >> $GITHUB_OUTPUT
          elif [ "$TOTAL" -eq 0 ]; then
            echo "::warning::Zero dropped domains between $OLDER and $NEWER — snapshots may be identical"
            echo "has_dropped=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload combined dropped file
        if: steps.diff.outputs.has_dropped == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dropped-domains
          path: dropped/
          retention-days: 7

  # Step 2: Score dropped domains
  score:
    needs: diff-zones
    if: needs.diff-zones.outputs.has_dropped == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    outputs:
      qualified: ${{ steps.score.outputs.qualified }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Download dropped domains
        uses: actions/download-artifact@v4
        with:
          name: dropped-domains
          path: dropped/

      - name: Score domains
        id: score
        run: |
          set -eo pipefail
          LIMIT="${{ github.event.inputs.limit || '5000' }}"

          # Find the dropped file — don't hardcode today's date, use whatever diff-zones produced
          DROPPED=$(ls dropped/all_dropped_*.txt 2>/dev/null | sort | tail -1)

          echo "Looking for dropped file..."
          ls -la dropped/ 2>/dev/null || echo "  dropped/ empty"

          if [ -z "$DROPPED" ] || [ ! -f "$DROPPED" ]; then
            echo "::error::No dropped domains file found — diff-zones may have failed"
            ls -la dropped/ 2>/dev/null || echo "  dropped/ directory does not exist"
            echo "qualified=0" >> $GITHUB_OUTPUT
            exit 1
          fi

          TOTAL=$(wc -l < "$DROPPED")
          echo "Scoring $TOTAL dropped domains (limit: $LIMIT)..."

          mkdir -p results
          python scripts/score_dropped.py "$DROPPED" \
            --output results/scored.csv \
            --opr-key "${OPENPAGERANK_API_KEY}" \
            --limit "$LIMIT" \
            --min-score 30

          if [ -f results/scored.csv ]; then
            QUALIFIED=$(tail -n +2 results/scored.csv | wc -l)
          else
            QUALIFIED=0
          fi
          echo "qualified=$QUALIFIED" >> $GITHUB_OUTPUT

      - name: Upload to D1 via Worker API
        if: steps.score.outputs.qualified != '0'
        env:
          EYECX_API_URL: https://eyecx-api.kjssamsungdev.workers.dev
          EYECX_API_SECRET: ${{ secrets.EYECX_API_SECRET }}
        run: |
          if [ ! -f results/scored.csv ]; then echo "No CSV"; exit 0; fi

          echo "Converting CSV to JSON and uploading in batches..."
          python3 -c "
          import csv, json, os, urllib.request

          api = os.environ['EYECX_API_URL']
          secret = os.environ['EYECX_API_SECRET']
          rows = []
          with open('results/scored.csv') as f:
              for row in csv.DictReader(f):
                  clean = {}
                  for k, v in row.items():
                      if v == '': clean[k] = None
                      elif k in ('potential_score','wayback_snapshots','backlinks','majestic_rank','tranco_rank','brand_score'):
                          clean[k] = int(v) if v else None
                      elif k in ('page_rank','estimated_age_years','estimated_flip_value'):
                          clean[k] = float(v) if v else None
                      else: clean[k] = v
                  rows.append(clean)

          total_inserted = 0
          batch_size = 200
          for i in range(0, len(rows), batch_size):
              batch = rows[i:i+batch_size]
              data = json.dumps(batch).encode()
              req = urllib.request.Request(
                  f'{api}/api/domains/bulk',
                  data=data,
                  headers={'Authorization': f'Bearer {secret}', 'Content-Type': 'application/json'},
                  method='POST'
              )
              resp = urllib.request.urlopen(req, timeout=30)
              result = json.loads(resp.read())
              total_inserted += result.get('inserted', 0)
              print(f'  Batch {i//batch_size + 1}: {result.get(\"inserted\",0)}/{len(batch)} inserted')

          print(f'Total uploaded: {total_inserted}/{len(rows)}')
          "

      - name: Verify domains via RDAP
        if: steps.score.outputs.qualified != '0'
        env:
          EYECX_API_URL: https://eyecx-api.kjssamsungdev.workers.dev
          EYECX_API_SECRET: ${{ secrets.EYECX_API_SECRET }}
        run: |
          echo "Running RDAP verification from GH runner (not Worker — CF IPs blocked by RDAP)..."
          python3 -c "
          import csv, json, urllib.request, time, os

          api = os.environ['EYECX_API_URL']
          secret = os.environ['EYECX_API_SECRET']
          available, registered, errors = 0, 0, 0

          with open('results/scored.csv') as f:
              domains = [row['domain'] for row in csv.DictReader(f)]

          print(f'Verifying {len(domains)} domains via RDAP...')
          updates = []

          for i, domain in enumerate(domains):
              try:
                  req = urllib.request.Request(f'https://rdap.org/domain/{domain}')
                  resp = urllib.request.urlopen(req, timeout=10)
                  status = 'registered'
                  registered += 1
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      status = 'available'
                      available += 1
                  else:
                      status = 'unknown'
                      errors += 1
              except Exception:
                  status = 'unknown'
                  errors += 1

              updates.append({'domain': domain, 'availability_status': status})

              if (i + 1) % 50 == 0:
                  print(f'  Checked {i+1}/{len(domains)}: {available} available, {registered} registered')
                  time.sleep(1)

          print(f'RDAP done: {available} available, {registered} registered, {errors} errors')

          # Batch update statuses via Worker API
          for i in range(0, len(updates), 200):
              batch = updates[i:i+200]
              data = json.dumps(batch).encode()
              try:
                  req = urllib.request.Request(
                      f'{api}/api/domains/verify-update', data=data,
                      headers={'Authorization': f'Bearer {secret}', 'Content-Type': 'application/json'},
                      method='POST')
                  resp = urllib.request.urlopen(req, timeout=30)
                  r = json.loads(resp.read())
                  print(f'  Updated batch: {r.get(\"updated\",0)}')
              except Exception as e:
                  print(f'  Batch update failed: {e}')

          print(f'Verification complete: {available} available, {registered} registered')
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_number }}
          path: results/*.csv
          retention-days: 30

      - name: Report
        if: always()
        run: |
          echo "## EyeCX Daily Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dropped domains | ${{ needs.diff-zones.outputs.total_dropped }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Qualified (score >= 30) | ${{ steps.score.outputs.qualified || '0' }} |" >> $GITHUB_STEP_SUMMARY
