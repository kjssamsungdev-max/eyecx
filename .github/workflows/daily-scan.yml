name: EyeCX Daily Scan

on:
  schedule:
    # Run at 2 AM UTC daily
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      max_seeds:
        description: 'Maximum seeds to process'
        required: false
        default: '50'
      min_score:
        description: 'Minimum score threshold'
        required: false
        default: '40'

env:
  PYTHON_VERSION: '3.11'
  OPENPAGERANK_API_KEY: ${{ secrets.OPENPAGERANK_API_KEY }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hours max
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install aiohttp pandas tqdm
      
      - name: Download seed domains
        run: |
          # Download latest seeds from your source or use repo file
          if [ -f "seeds.txt" ]; then
            echo "Using seeds.txt from repo"
          else
            echo "techcrunch.com" > seeds.txt
            echo "producthunt.com" >> seeds.txt
            # Add more default seeds
          fi
          echo "Loaded $(wc -l < seeds.txt) seeds"
      
      - name: Run EyeCX Pipeline
        id: scan
        run: |
          python eyecx.py \
            --seeds seeds.txt \
            --output ./results \
            --opr-key "$OPENPAGERANK_API_KEY"
          
          # Count results
          DIAMONDS=$(cat results/diamonds_*.csv 2>/dev/null | wc -l || echo "0")
          GOLDS=$(cat results/golds_*.csv 2>/dev/null | wc -l || echo "0")
          TOTAL=$(cat results/all_qualified_*.csv 2>/dev/null | wc -l || echo "0")
          
          echo "diamonds=$DIAMONDS" >> $GITHUB_OUTPUT
          echo "golds=$GOLDS" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
      
      - name: Upload to Cloudflare D1
        run: |
          # Export results to D1 via API
          for file in results/*.csv; do
            if [ -f "$file" ]; then
              echo "Uploading $file to D1..."
              # Convert CSV to SQL inserts and execute via D1 API
              python scripts/upload_to_d1.py "$file"
            fi
          done
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_number }}
          path: |
            results/*.csv
            results/*.log
          retention-days: 30
      
      - name: Notify results
        if: always()
        run: |
          echo "## EyeCX Daily Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 💎 Diamonds | ${{ steps.scan.outputs.diamonds }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🥇 Golds | ${{ steps.scan.outputs.golds }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Qualified | ${{ steps.scan.outputs.total }} |" >> $GITHUB_STEP_SUMMARY
      
      - name: Send Discord notification
        if: success() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🎯 EyeCX Daily Scan Complete",
                "color": 5763719,
                "fields": [
                  {"name": "💎 Diamonds", "value": "${{ steps.scan.outputs.diamonds }}", "inline": true},
                  {"name": "🥇 Golds", "value": "${{ steps.scan.outputs.golds }}", "inline": true},
                  {"name": "Total", "value": "${{ steps.scan.outputs.total }}", "inline": true}
                ],
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
              }]
            }'

  # Generate subscription lists after scan
  generate-lists:
    needs: scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Generate subscription lists
        run: |
          # Query D1 and generate tier-specific lists
          python scripts/generate_subscription_lists.py
      
      - name: Upload subscription lists
        uses: actions/upload-artifact@v4
        with:
          name: subscription-lists-${{ github.run_number }}
          path: subscription_lists/*.json
          retention-days: 7

  # Auto-purchase high-value domains (disabled by default)
  auto-purchase:
    needs: scan
    if: false  # Enable when ready: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Check purchase queue
        run: |
          # Get diamond domains from today's scan
          python scripts/process_purchase_queue.py \
            --max-purchases 5 \
            --max-price 15.00
