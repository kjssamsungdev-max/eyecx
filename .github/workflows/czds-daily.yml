name: CZDS Zone File Processing

on:
  schedule:
    # Run at 1 AM UTC daily (auth + download + parse + diff + upload)
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      tld:
        description: 'TLD to process (default: all approved)'
        required: false
        default: 'all'

env:
  PYTHON_VERSION: '3.11'
  EYECX_API_URL: https://eyecx-api.kjssamsungdev.workers.dev
  EYECX_API_SECRET: ${{ secrets.EYECX_API_SECRET }}
  CZDS_USERNAME: ${{ secrets.CZDS_USERNAME }}
  CZDS_PASSWORD: ${{ secrets.CZDS_PASSWORD }}

jobs:
  # Step 1: Discover which TLDs are approved and their download URLs
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      approved_tlds: ${{ steps.zones.outputs.approved_tlds }}
      zone_urls: ${{ steps.zones.outputs.zone_urls }}

    steps:
      - name: Authenticate and get approved zones
        id: zones
        run: |
          set -euo pipefail
          # Authenticate with CZDS
          echo "Authenticating with CZDS..."
          RESP=$(curl -s -X POST \
            "https://account-api.icann.org/api/authenticate" \
            -H "Content-Type: application/json" \
            -H "User-Agent: EyeCX/1.0 (https://eyecx.com)" \
            -d "{\"username\": \"$CZDS_USERNAME\", \"password\": \"$CZDS_PASSWORD\"}")

          TOKEN=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('accessToken',''))")

          if [ -z "$TOKEN" ]; then
            echo "CZDS authentication failed"
            echo "$RESP" | head -c 500
            exit 1
          fi
          echo "CZDS auth successful"

          # Fetch approved download links
          LINKS=$(curl -s \
            -H "Authorization: Bearer $TOKEN" \
            -H "User-Agent: EyeCX/1.0 (https://eyecx.com)" \
            "https://czds-api.icann.org/czds/downloads/links")

          echo "Raw CZDS links response (first 1000 chars):"
          echo "$LINKS" | head -c 1000

          # Build TLD list and TLD→URL map
          python3 -c "
          import sys, json

          raw = '''$LINKS'''
          try:
              links = json.loads(raw)
          except:
              print('Failed to parse CZDS links response', file=sys.stderr)
              sys.exit(1)

          if not isinstance(links, list) or len(links) == 0:
              print('No approved zones found', file=sys.stderr)
              sys.exit(1)

          tld_list = []
          url_map = {}
          for url in links:
              tld = url.split('/')[-1].replace('.zone', '')
              tld_list.append(tld)
              url_map[tld] = url

          print(f'Approved TLDs ({len(tld_list)}): {sorted(tld_list)}', file=sys.stderr)

          # Write outputs
          with open('$GITHUB_OUTPUT', 'a') as f:
              f.write(f'approved_tlds={json.dumps(tld_list)}\n')
              f.write(f'zone_urls={json.dumps(url_map)}\n')
          " 2>&1

          # Validate input TLD if specified
          INPUT_TLD="${{ github.event.inputs.tld || 'all' }}"
          if [ "$INPUT_TLD" != "all" ]; then
            echo "Checking if $INPUT_TLD is approved..."
            APPROVED=$(cat $GITHUB_OUTPUT | grep approved_tlds | cut -d= -f2-)
            IS_APPROVED=$(echo "$APPROVED" | python3 -c "
          import sys, json
          tlds = json.load(sys.stdin)
          print('yes' if '$INPUT_TLD' in tlds else 'no')
          ")
            if [ "$IS_APPROVED" = "no" ]; then
              echo "::error::TLD '$INPUT_TLD' is not in your approved CZDS zones"
              exit 1
            fi
          fi

  # Step 2: Process each approved TLD
  process-zones:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        tld: [xyz, info, biz, net, org, com, edeka, statefarm, pru, prudential, nfl, mattel, chase, jpmorgan, intuit, mint, farmers, dupont]
        include:
          - tld: xyz
            tld_class: open
          - tld: info
            tld_class: open
          - tld: biz
            tld_class: open
          - tld: net
            tld_class: open
          - tld: org
            tld_class: open
          - tld: com
            tld_class: open
          - tld: edeka
            tld_class: brand
          - tld: statefarm
            tld_class: brand
          - tld: pru
            tld_class: brand
          - tld: prudential
            tld_class: brand
          - tld: nfl
            tld_class: brand
          - tld: mattel
            tld_class: brand
          - tld: chase
            tld_class: brand
          - tld: jpmorgan
            tld_class: brand
          - tld: intuit
            tld_class: brand
          - tld: mint
            tld_class: brand
          - tld: farmers
            tld_class: brand
          - tld: dupont
            tld_class: brand

    steps:
      - name: Check if TLD is approved
        id: check
        run: |
          set -euo pipefail
          MATRIX_TLD="${{ matrix.tld }}"
          INPUT_TLD="${{ github.event.inputs.tld || 'all' }}"
          APPROVED='${{ needs.discover.outputs.approved_tlds }}'

          IS_APPROVED=$(echo "$APPROVED" | python3 -c "
          import sys, json
          tlds = json.load(sys.stdin)
          print('yes' if '$MATRIX_TLD' in tlds else 'no')
          ")

          if [ "$INPUT_TLD" != "all" ] && [ "$INPUT_TLD" != "$MATRIX_TLD" ]; then
            echo "Skipping $MATRIX_TLD (user requested $INPUT_TLD only)"
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [ "$IS_APPROVED" != "yes" ]; then
            echo "Skipping $MATRIX_TLD (not approved in CZDS)"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "$MATRIX_TLD is approved, proceeding"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: pip install aiohttp

      - name: Check for existing snapshot
        if: steps.check.outputs.skip != 'true'
        id: existing
        run: |
          set -euo pipefail
          TLD="${{ matrix.tld }}"
          TODAY=$(date -u +%Y-%m-%d)
          YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d)

          echo "tld=$TLD" >> $GITHUB_OUTPUT
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "yesterday=$YESTERDAY" >> $GITHUB_OUTPUT

          # Check R2 directly via S3 API (avoids Worker body-size limits)
          R2_KEY="snapshots/${TLD}/${TLD}_${TODAY}.domains.txt"
          R2_ENDPOINT="https://dbaac4c99956159d7594d90033b0224d.r2.cloudflarestorage.com"

          OBJ_SIZE=$(AWS_ACCESS_KEY_ID="${{ secrets.R2_ACCESS_KEY_ID }}" \
            AWS_SECRET_ACCESS_KEY="${{ secrets.R2_SECRET_ACCESS_KEY }}" \
            AWS_DEFAULT_REGION=auto \
            aws s3api head-object \
              --bucket eyecx-zones \
              --key "$R2_KEY" \
              --endpoint-url "$R2_ENDPOINT" \
              --query "ContentLength" \
              --output text 2>/dev/null || echo "0")

          if [ "$OBJ_SIZE" -gt 10000 ]; then
            echo "Real snapshot exists: $R2_KEY (${OBJ_SIZE} bytes)"
            echo "has_snapshot=true" >> $GITHUB_OUTPUT
          else
            echo "No valid snapshot for ${TLD} ${TODAY}"
            echo "has_snapshot=false" >> $GITHUB_OUTPUT
          fi

      - name: Download zone file from CZDS
        if: steps.check.outputs.skip != 'true' && steps.existing.outputs.has_snapshot != 'true'
        id: czds
        run: |
          set -eo pipefail
          TLD="${{ matrix.tld }}"
          TODAY="${{ steps.existing.outputs.today }}"

          # Fresh authentication — tokens expire quickly
          echo "Authenticating with CZDS..."
          TOKEN=$(curl -s -X POST \
            "https://account-api.icann.org/api/authenticate" \
            -H "Content-Type: application/json" \
            -H "User-Agent: EyeCX/1.0 (https://eyecx.com)" \
            -d "{\"username\": \"$CZDS_USERNAME\", \"password\": \"$CZDS_PASSWORD\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('accessToken',''))")

          if [ -z "$TOKEN" ]; then
            echo "::error::CZDS authentication failed"
            exit 1
          fi
          echo "CZDS auth successful (fresh token)"

          # Get the exact download URL from the discover job's URL map
          ZONE_URLS='${{ needs.discover.outputs.zone_urls }}'
          DOWNLOAD_URL=$(echo "$ZONE_URLS" | python3 -c "
          import sys, json
          urls = json.load(sys.stdin)
          print(urls.get('$TLD', ''))
          ")

          if [ -z "$DOWNLOAD_URL" ]; then
            echo "::error::No download URL found for $TLD"
            exit 1
          fi
          echo "Download URL: $DOWNLOAD_URL"

          # Download zone file using the exact URL from CZDS
          mkdir -p zone_snapshots/${TLD}
          RAW_FILE="zone_snapshots/${TLD}/${TLD}_${TODAY}.zone"

          HTTP_CODE=$(curl -s -o "$RAW_FILE" -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "User-Agent: EyeCX/1.0 (https://eyecx.com)" \
            "$DOWNLOAD_URL")

          echo "CZDS HTTP response: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::CZDS download failed with HTTP $HTTP_CODE"
            head -c 500 "$RAW_FILE"
            exit 1
          fi

          SIZE=$(stat -c%s "$RAW_FILE" 2>/dev/null || echo "0")
          echo "Downloaded: $RAW_FILE ($(( SIZE / 1024 / 1024 )) MB)"

          # Brand TLDs have tiny zone files (single-registrant); lower threshold
          MIN_SIZE=10000
          if [ "${{ matrix.tld_class }}" = "brand" ]; then
            MIN_SIZE=100
          fi
          if [ "$SIZE" -lt "$MIN_SIZE" ]; then
            echo "::error::File too small ($SIZE bytes) for ${{ matrix.tld_class }} TLD"
            head -c 500 "$RAW_FILE"
            exit 1
          fi

          # Validate content is a zone file (not HTML error page)
          HEAD=$(head -c 200 "$RAW_FILE")
          if echo "$HEAD" | grep -qi "<!doctype\|<html\|<head\|{\"error"; then
            echo "::error::Downloaded file is HTML/JSON error, not a zone file"
            head -c 500 "$RAW_FILE"
            exit 1
          fi

          # Detect if gzipped or plain text
          MAGIC=$(xxd -l 2 -p "$RAW_FILE")
          if [ "$MAGIC" = "1f8b" ]; then
            echo "File is gzipped"
            GZ_FILE="${RAW_FILE}.gz"
            mv "$RAW_FILE" "$GZ_FILE"
          else
            if head -20 "$RAW_FILE" | grep -qiE '^\s*(;|.*\s+(SOA|NS|IN)\s+)'; then
              echo "File is a valid plain-text zone file"
            else
              echo "::warning::File doesn't look like a standard zone file, proceeding anyway"
              head -5 "$RAW_FILE"
            fi
            echo "Compressing..."
            gzip -c "$RAW_FILE" > "${RAW_FILE}.gz"
            GZ_FILE="${RAW_FILE}.gz"
          fi

          echo "gz_file=$GZ_FILE" >> $GITHUB_OUTPUT

      - name: Parse zone file and create snapshot
        if: steps.check.outputs.skip != 'true' && steps.existing.outputs.has_snapshot != 'true'
        id: parse
        run: |
          set -eo pipefail
          TLD="${{ matrix.tld }}"
          TODAY="${{ steps.existing.outputs.today }}"
          GZ_FILE="${{ steps.czds.outputs.gz_file }}"

          echo "Parsing ${TLD} zone file..."
          python3 eyecx_czds.py ingest --tld "$TLD" --file "$GZ_FILE" --date "$TODAY"

          SNAP_FILE="zone_snapshots/${TLD}/${TLD}_${TODAY}.domains.txt"
          DOMAIN_COUNT=$(wc -l < "$SNAP_FILE")
          echo "Parsed: $DOMAIN_COUNT domains"

          # Brand TLDs may have very few domains (single-registrant)
          MIN_DOMAINS=100
          if [ "${{ matrix.tld_class }}" = "brand" ]; then
            MIN_DOMAINS=1
          fi
          if [ "$DOMAIN_COUNT" -lt "$MIN_DOMAINS" ]; then
            echo "::error::Only $DOMAIN_COUNT domains parsed — zone file may be invalid (min $MIN_DOMAINS for ${{ matrix.tld_class }})"
            echo "First 20 lines of snapshot:"
            head -20 "$SNAP_FILE"
            echo "First 5 lines of raw zone file:"
            zcat "$GZ_FILE" 2>/dev/null | head -5 || head -5 "$GZ_FILE"
            exit 1
          fi

          echo "domain_count=$DOMAIN_COUNT" >> $GITHUB_OUTPUT
          echo "snap_file=$SNAP_FILE" >> $GITHUB_OUTPUT

      - name: Upload snapshot to R2
        if: steps.check.outputs.skip != 'true' && steps.existing.outputs.has_snapshot != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          TLD="${{ matrix.tld }}"
          TODAY="${{ steps.existing.outputs.today }}"
          SNAP_FILE="${{ steps.parse.outputs.snap_file }}"
          R2_KEY="snapshots/${TLD}/${TLD}_${TODAY}.domains.txt"
          R2_ENDPOINT="https://dbaac4c99956159d7594d90033b0224d.r2.cloudflarestorage.com"

          SIZE=$(stat -c%s "$SNAP_FILE" 2>/dev/null || echo "0")
          echo "Uploading $R2_KEY to R2 ($(( SIZE / 1024 / 1024 )) MB)..."

          aws s3 cp "$SNAP_FILE" "s3://eyecx-zones/${R2_KEY}" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "text/plain" \
            --no-progress

          echo "Upload complete: $R2_KEY"

      - name: Diff against yesterday
        if: steps.check.outputs.skip != 'true'
        id: diff
        run: |
          set -euo pipefail
          TLD="${{ matrix.tld }}"
          TODAY="${{ steps.existing.outputs.today }}"
          YESTERDAY="${{ steps.existing.outputs.yesterday }}"

          echo "Diffing ${TLD}: ${YESTERDAY} vs ${TODAY}..."
          RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $EYECX_API_SECRET" \
            -H "Content-Type: application/json" \
            -H "User-Agent: EyeCX/1.0 (https://eyecx.com)" \
            -d "{\"tld\": \"$TLD\", \"yesterday\": \"$YESTERDAY\", \"today\": \"$TODAY\"}" \
            "$EYECX_API_URL/api/zones/diff")

          echo "$RESP" | python3 -m json.tool

          DROPPED=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('dropped_count', d.get('error','0')))")
          ADDED=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('added_count', d.get('error','0')))")

          echo "dropped=$DROPPED" >> $GITHUB_OUTPUT
          echo "added=$ADDED" >> $GITHUB_OUTPUT

      - name: Report results
        if: steps.check.outputs.skip != 'true' && always()
        run: |
          TLD="${{ matrix.tld }}"
          echo "## CZDS Results: .${TLD}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Date | ${{ steps.existing.outputs.today }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Domains parsed | ${{ steps.parse.outputs.domain_count || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dropped | ${{ steps.diff.outputs.dropped || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Added | ${{ steps.diff.outputs.added || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY

  # Final status check
  cleanup:
    needs: [discover, process-zones]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check CZDS status
        run: |
          set -euo pipefail
          echo "## Approved TLDs" >> $GITHUB_STEP_SUMMARY
          echo '${{ needs.discover.outputs.approved_tlds }}' | python3 -c "
          import sys, json
          tlds = json.load(sys.stdin)
          for t in sorted(tlds):
              print(f'- .{t}')
          " >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## R2 Status" >> $GITHUB_STEP_SUMMARY

          curl -s \
            -H "Authorization: Bearer ${{ secrets.EYECX_API_SECRET }}" \
            -H "User-Agent: EyeCX/1.0 (https://eyecx.com)" \
            "https://eyecx-api.kjssamsungdev.workers.dev/api/czds/status" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f\"Raw zone files: {len(d.get('raw_zone_files',[]))}\"  )
          print(f\"Snapshots: {len(d.get('snapshots',[]))}\"  )
          print(f\"Dropped lists: {len(d.get('dropped_lists',[]))}\"  )
          for s in d.get('snapshots',[]):
              print(f\"  - {s['key']} ({s['size_mb']} MB)\")
          " >> $GITHUB_STEP_SUMMARY

      - name: R2 retention cleanup (30 days)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          R2_ENDPOINT="https://dbaac4c99956159d7594d90033b0224d.r2.cloudflarestorage.com"
          CUTOFF=$(date -u -d "30 days ago" +%Y-%m-%d)
          TODAY=$(date -u +%Y-%m-%d)
          YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d)
          DELETED=0

          echo "R2 retention: deleting objects older than $CUTOFF (preserving $YESTERDAY + $TODAY)"

          for PREFIX in snapshots dropped raw; do
            OBJECTS=$(aws s3 ls "s3://eyecx-zones/${PREFIX}/" --recursive --endpoint-url "$R2_ENDPOINT" 2>/dev/null || echo "")
            echo "$OBJECTS" | while IFS= read -r line; do
              [ -z "$line" ] && continue
              KEY=$(echo "$line" | awk '{print $4}')
              [ -z "$KEY" ] && continue
              # Extract date from key (format: prefix/tld/tld_YYYY-MM-DD.ext)
              FILE_DATE=$(echo "$KEY" | grep -oP '\d{4}-\d{2}-\d{2}' | head -1)
              [ -z "$FILE_DATE" ] && continue
              # Always preserve yesterday + today
              [ "$FILE_DATE" = "$TODAY" ] && continue
              [ "$FILE_DATE" = "$YESTERDAY" ] && continue
              # Delete if older than cutoff
              if [[ "$FILE_DATE" < "$CUTOFF" ]]; then
                aws s3 rm "s3://eyecx-zones/${KEY}" --endpoint-url "$R2_ENDPOINT" --quiet 2>/dev/null && DELETED=$((DELETED + 1)) || true
              fi
            done
          done

          echo "## R2 Retention" >> $GITHUB_STEP_SUMMARY
          echo "Cutoff: $CUTOFF | Deleted: $DELETED objects" >> $GITHUB_STEP_SUMMARY
