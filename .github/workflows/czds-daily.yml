name: CZDS Zone File Processing

on:
  schedule:
    # Run at 1 AM UTC daily (auth + download + parse + diff + upload)
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      tld:
        description: 'TLD to process (default: all approved)'
        required: false
        default: 'all'

env:
  PYTHON_VERSION: '3.11'
  EYECX_API_URL: https://eyecx-api.kjssamsungdev.workers.dev
  EYECX_API_SECRET: ${{ secrets.EYECX_API_SECRET }}
  CZDS_USERNAME: ${{ secrets.CZDS_USERNAME }}
  CZDS_PASSWORD: ${{ secrets.CZDS_PASSWORD }}

jobs:
  # Step 1: Authenticate and discover which TLDs are approved
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      token: ${{ steps.auth.outputs.token }}
      approved_tlds: ${{ steps.zones.outputs.approved_tlds }}

    steps:
      - name: Authenticate with CZDS
        id: auth
        run: |
          echo "Authenticating with CZDS..."
          RESP=$(curl -s -X POST \
            "https://account-api.icann.org/api/authenticate" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"$CZDS_USERNAME\", \"password\": \"$CZDS_PASSWORD\"}")

          TOKEN=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('accessToken',''))")

          if [ -z "$TOKEN" ]; then
            echo "CZDS authentication failed"
            echo "$RESP" | head -c 500
            exit 1
          fi
          echo "CZDS auth successful"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Get approved zone list
        id: zones
        run: |
          TOKEN="${{ steps.auth.outputs.token }}"

          # Fetch approved download links from CZDS
          LINKS=$(curl -s \
            -H "Authorization: Bearer $TOKEN" \
            "https://czds-api.icann.org/czds/downloads/links")

          echo "Raw CZDS links response (first 500 chars):"
          echo "$LINKS" | head -c 500

          # Extract TLD names from download URLs
          # URLs look like: https://czds-api.icann.org/czds/downloads/xyz.zone
          APPROVED=$(echo "$LINKS" | python3 -c "
          import sys, json
          try:
              links = json.load(sys.stdin)
              if isinstance(links, list):
                  tlds = [url.split('/')[-1].replace('.zone','') for url in links]
                  print(json.dumps(tlds))
              else:
                  print('[]')
          except:
              print('[]')
          ")

          echo "Approved TLDs: $APPROVED"
          echo "approved_tlds=$APPROVED" >> $GITHUB_OUTPUT

          # Also filter by input TLD if specified
          INPUT_TLD="${{ github.event.inputs.tld || 'all' }}"
          if [ "$INPUT_TLD" != "all" ]; then
            echo "Filtering to requested TLD: $INPUT_TLD"
            IS_APPROVED=$(echo "$APPROVED" | python3 -c "
          import sys, json
          tlds = json.load(sys.stdin)
          print('yes' if '$INPUT_TLD' in tlds else 'no')
          ")
            if [ "$IS_APPROVED" = "no" ]; then
              echo "::error::TLD '$INPUT_TLD' is not in your approved CZDS zones"
              exit 1
            fi
          fi

  # Step 2: Process each approved TLD
  process-zones:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        tld: [xyz, info, biz, net, org, com]

    steps:
      - name: Check if TLD is approved
        id: check
        run: |
          MATRIX_TLD="${{ matrix.tld }}"
          INPUT_TLD="${{ github.event.inputs.tld || 'all' }}"
          APPROVED='${{ needs.discover.outputs.approved_tlds }}'

          # Check if this TLD is in the approved list
          IS_APPROVED=$(echo "$APPROVED" | python3 -c "
          import sys, json
          tlds = json.load(sys.stdin)
          print('yes' if '$MATRIX_TLD' in tlds else 'no')
          ")

          # Check input filter
          if [ "$INPUT_TLD" != "all" ] && [ "$INPUT_TLD" != "$MATRIX_TLD" ]; then
            echo "Skipping $MATRIX_TLD (user requested $INPUT_TLD only)"
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [ "$IS_APPROVED" != "yes" ]; then
            echo "Skipping $MATRIX_TLD (not approved in CZDS)"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "$MATRIX_TLD is approved, proceeding"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: pip install aiohttp

      - name: Check for existing snapshot
        if: steps.check.outputs.skip != 'true'
        id: existing
        run: |
          TLD="${{ matrix.tld }}"
          TODAY=$(date -u +%Y-%m-%d)
          YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d)

          echo "tld=$TLD" >> $GITHUB_OUTPUT
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "yesterday=$YESTERDAY" >> $GITHUB_OUTPUT

          # Check if snapshot already exists in R2
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $EYECX_API_SECRET" \
            "$EYECX_API_URL/api/zones/${TLD}/${TODAY}")

          if [ "$STATUS" = "200" ]; then
            # Verify it has real data (not a stub)
            SIZE=$(curl -s -H "Authorization: Bearer $EYECX_API_SECRET" \
              "$EYECX_API_URL/api/zones/${TLD}/${TODAY}" | wc -c)
            if [ "$SIZE" -gt 10000 ]; then
              echo "Real snapshot exists for ${TLD} ${TODAY} (${SIZE} bytes)"
              echo "has_snapshot=true" >> $GITHUB_OUTPUT
            else
              echo "Stub snapshot found (${SIZE} bytes), re-downloading"
              echo "has_snapshot=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "No snapshot for ${TLD} ${TODAY}"
            echo "has_snapshot=false" >> $GITHUB_OUTPUT
          fi

      - name: Download zone file from CZDS
        if: steps.check.outputs.skip != 'true' && steps.existing.outputs.has_snapshot != 'true'
        id: czds
        run: |
          set -eo pipefail
          TLD="${{ matrix.tld }}"
          TODAY="${{ steps.existing.outputs.today }}"
          TOKEN="${{ needs.discover.outputs.token }}"

          echo "Downloading ${TLD} zone file..."
          mkdir -p zone_snapshots/${TLD}
          RAW_FILE="zone_snapshots/${TLD}/${TLD}_${TODAY}.zone"

          # Download with HTTP status check
          HTTP_CODE=$(curl -s -o "$RAW_FILE" -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            "https://czds-api.icann.org/czds/downloads/${TLD}.zone")

          echo "CZDS HTTP response: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::CZDS download failed with HTTP $HTTP_CODE"
            head -c 500 "$RAW_FILE"
            exit 1
          fi

          SIZE=$(stat -c%s "$RAW_FILE" 2>/dev/null || echo "0")
          echo "Downloaded: $RAW_FILE ($(( SIZE / 1024 / 1024 )) MB)"

          if [ "$SIZE" -lt 10000 ]; then
            echo "::error::File too small ($SIZE bytes), likely not a real zone file"
            head -c 500 "$RAW_FILE"
            exit 1
          fi

          # Validate content is a zone file (not HTML error page)
          HEAD=$(head -c 200 "$RAW_FILE")
          if echo "$HEAD" | grep -qi "<!doctype\|<html\|<head\|{\"error"; then
            echo "::error::Downloaded file is HTML/JSON error, not a zone file"
            head -c 500 "$RAW_FILE"
            exit 1
          fi

          # Detect if gzipped or plain text
          MAGIC=$(xxd -l 2 -p "$RAW_FILE")
          if [ "$MAGIC" = "1f8b" ]; then
            echo "File is gzipped"
            GZ_FILE="${RAW_FILE}.gz"
            mv "$RAW_FILE" "$GZ_FILE"
          else
            # Verify it looks like zone file content
            if head -20 "$RAW_FILE" | grep -qiE '^\s*(;|.*\s+(SOA|NS|IN)\s+)'; then
              echo "File is a valid plain-text zone file"
            else
              echo "::warning::File doesn't look like a standard zone file, proceeding anyway"
              head -5 "$RAW_FILE"
            fi
            echo "Compressing..."
            gzip -c "$RAW_FILE" > "${RAW_FILE}.gz"
            GZ_FILE="${RAW_FILE}.gz"
          fi

          echo "gz_file=$GZ_FILE" >> $GITHUB_OUTPUT

      - name: Parse zone file and create snapshot
        if: steps.check.outputs.skip != 'true' && steps.existing.outputs.has_snapshot != 'true'
        id: parse
        run: |
          set -eo pipefail
          TLD="${{ matrix.tld }}"
          TODAY="${{ steps.existing.outputs.today }}"
          GZ_FILE="${{ steps.czds.outputs.gz_file }}"

          echo "Parsing ${TLD} zone file..."
          python3 eyecx_czds.py ingest --tld "$TLD" --file "$GZ_FILE" --date "$TODAY"

          SNAP_FILE="zone_snapshots/${TLD}/${TLD}_${TODAY}.domains.txt"
          DOMAIN_COUNT=$(wc -l < "$SNAP_FILE")
          echo "Parsed: $DOMAIN_COUNT domains"

          if [ "$DOMAIN_COUNT" -lt 100 ]; then
            echo "::error::Only $DOMAIN_COUNT domains parsed — zone file may be invalid"
            echo "First 20 lines of snapshot:"
            head -20 "$SNAP_FILE"
            echo "First 5 lines of raw zone file:"
            zcat "$GZ_FILE" 2>/dev/null | head -5 || head -5 "$GZ_FILE"
            exit 1
          fi

          echo "domain_count=$DOMAIN_COUNT" >> $GITHUB_OUTPUT
          echo "snap_file=$SNAP_FILE" >> $GITHUB_OUTPUT

      - name: Upload snapshot to R2
        if: steps.check.outputs.skip != 'true' && steps.existing.outputs.has_snapshot != 'true'
        run: |
          TLD="${{ matrix.tld }}"
          TODAY="${{ steps.existing.outputs.today }}"
          SNAP_FILE="${{ steps.parse.outputs.snap_file }}"

          echo "Uploading snapshot to R2..."
          RESP=$(curl -s -X PUT \
            -H "Authorization: Bearer $EYECX_API_SECRET" \
            -H "Content-Type: text/plain" \
            --data-binary "@$SNAP_FILE" \
            "$EYECX_API_URL/api/zones/${TLD}/${TODAY}")

          echo "$RESP" | python3 -m json.tool
          echo "Upload complete"

      - name: Diff against yesterday
        if: steps.check.outputs.skip != 'true'
        id: diff
        run: |
          TLD="${{ matrix.tld }}"
          TODAY="${{ steps.existing.outputs.today }}"
          YESTERDAY="${{ steps.existing.outputs.yesterday }}"

          echo "Diffing ${TLD}: ${YESTERDAY} vs ${TODAY}..."
          RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $EYECX_API_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"tld\": \"$TLD\", \"yesterday\": \"$YESTERDAY\", \"today\": \"$TODAY\"}" \
            "$EYECX_API_URL/api/zones/diff")

          echo "$RESP" | python3 -m json.tool

          DROPPED=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('dropped_count', d.get('error','0')))")
          ADDED=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('added_count', d.get('error','0')))")

          echo "dropped=$DROPPED" >> $GITHUB_OUTPUT
          echo "added=$ADDED" >> $GITHUB_OUTPUT

      - name: Report results
        if: steps.check.outputs.skip != 'true' && always()
        run: |
          TLD="${{ matrix.tld }}"
          echo "## CZDS Results: .${TLD}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Date | ${{ steps.existing.outputs.today }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Domains parsed | ${{ steps.parse.outputs.domain_count || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dropped | ${{ steps.diff.outputs.dropped || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Added | ${{ steps.diff.outputs.added || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY

  # Final status check
  cleanup:
    needs: [discover, process-zones]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check CZDS status
        run: |
          echo "## Approved TLDs" >> $GITHUB_STEP_SUMMARY
          echo '${{ needs.discover.outputs.approved_tlds }}' | python3 -c "
          import sys, json
          tlds = json.load(sys.stdin)
          for t in sorted(tlds):
              print(f'- .{t}')
          " >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## R2 Status" >> $GITHUB_STEP_SUMMARY

          curl -s \
            -H "Authorization: Bearer ${{ secrets.EYECX_API_SECRET }}" \
            "https://eyecx-api.kjssamsungdev.workers.dev/api/czds/status" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(f\"Raw zone files: {len(d.get('raw_zone_files',[]))}\"  )
          print(f\"Snapshots: {len(d.get('snapshots',[]))}\"  )
          print(f\"Dropped lists: {len(d.get('dropped_lists',[]))}\"  )
          for s in d.get('snapshots',[]):
              print(f\"  - {s['key']} ({s['size_mb']} MB)\")
          " >> $GITHUB_STEP_SUMMARY
