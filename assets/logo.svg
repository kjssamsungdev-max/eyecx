<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="pupilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- Eye Icon -->
  <g transform="translate(20, 20)">
    <!-- Outer eye shape -->
    <ellipse cx="40" cy="40" rx="38" ry="28" fill="none" stroke="url(#eyeGrad)" stroke-width="4"/>
    
    <!-- Iris -->
    <circle cx="40" cy="40" r="20" fill="url(#eyeGrad)" opacity="0.3"/>
    <circle cx="40" cy="40" r="20" fill="none" stroke="url(#eyeGrad)" stroke-width="2"/>
    
    <!-- Pupil -->
    <circle cx="40" cy="40" r="10" fill="url(#pupilGrad)"/>
    
    <!-- Highlight -->
    <circle cx="34" cy="35" r="4" fill="#fff" opacity="0.8"/>
    
    <!-- Scan lines (CX = data scanning) -->
    <line x1="10" y1="40" x2="25" y2="40" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
    <line x1="55" y1="40" x2="70" y2="40" stroke="#a78bfa" stroke-width="2" opacity="0.6"/>
    <line x1="40" y1="15" x2="40" y2="22" stroke="#22d3ee" stroke-width="2" opacity="0.4"/>
    <line x1="40" y1="58" x2="40" y2="65" stroke="#a78bfa" stroke-width="2" opacity="0.4"/>
  </g>
  
  <!-- Text: EyeCX -->
  <text x="115" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="700" fill="#e4e4e7">
    Eye<tspan fill="url(#eyeGrad)">CX</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="117" y="98" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#71717a" letter-spacing="0.1em">
    EXPIRED DOMAIN INTELLIGENCE
  </text>
</svg>
