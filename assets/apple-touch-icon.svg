<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#12121a"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="pupilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" fill="url(#bgGrad)"/>
  
  <!-- Eye shape -->
  <ellipse cx="90" cy="90" rx="55" ry="38" fill="none" stroke="url(#eyeGrad)" stroke-width="5"/>
  
  <!-- Iris -->
  <circle cx="90" cy="90" r="25" fill="url(#eyeGrad)" opacity="0.3"/>
  <circle cx="90" cy="90" r="25" fill="none" stroke="url(#eyeGrad)" stroke-width="2"/>
  
  <!-- Pupil -->
  <circle cx="90" cy="90" r="13" fill="url(#pupilGrad)"/>
  
  <!-- Highlight -->
  <circle cx="84" cy="84" r="4" fill="#fff" opacity="0.85"/>
  
  <!-- Scan lines -->
  <line x1="40" y1="90" x2="58" y2="90" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="122" y1="90" x2="140" y2="90" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
